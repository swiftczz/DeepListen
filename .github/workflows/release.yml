name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without leading v), e.g. 0.1.0'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        if: steps.ver.outputs.is_tag == 'true'
        run: |
          # 找上一个 tag（首次发版时为空）
          prev_tag=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
          ./script/generate_changelog.sh "$prev_tag" "${{ github.ref_name }}" "${{ github.repository }}" > CHANGELOG.md
          echo "=== changelog ==="
          cat CHANGELOG.md

      - name: Build universal DMG
        run: APP_VERSION=${{ steps.ver.outputs.version }} ./script/build_and_run.sh --build-only universal --sign --dmg

      - name: Build arm64 DMG
        run: APP_VERSION=${{ steps.ver.outputs.version }} ./script/build_and_run.sh --build-only arm64 --sign --dmg

      - name: Build x86_64 DMG
        run: APP_VERSION=${{ steps.ver.outputs.version }} ./script/build_and_run.sh --build-only x86_64 --sign --dmg

      - name: List DMGs
        run: ls -lh dist/*.dmg

      - name: Upload DMGs to Release
        if: steps.ver.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.dmg
          body_path: CHANGELOG.md

      - name: Upload DMGs as workflow artifacts
        if: steps.ver.outputs.is_tag == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: DeepListen-DMGs-${{ steps.ver.outputs.version }}
          path: dist/*.dmg
